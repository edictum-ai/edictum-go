name: Code Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: review-${{ github.event.pull_request.number }}
  # Do NOT cancel in-progress: killing a review mid-flight and restarting
  # on the latest push loses findings from the full diff analysis.
  cancel-in-progress: false

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      issues: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      # SECURITY: Extract governance files from the BASE branch, not the PR.
      # A malicious PR could modify CLAUDE.md to inject instructions into the
      # reviewer agent.
      - name: Extract governance files from base branch
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          mkdir -p /tmp/governance
          git show "origin/${BASE_REF}:CLAUDE.md" > /tmp/governance/CLAUDE.md 2>/dev/null || true
          git show "origin/${BASE_REF}:.github/review-instructions.md" > /tmp/governance/review-instructions.md 2>/dev/null || true
          git show "origin/${BASE_REF}:.github/review-template.md" > /tmp/governance/review-template.md 2>/dev/null || true

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: "1.25"

      - name: Run Code Review
        id: review
        uses: anthropics/claude-code-action@9469d113c6afd29550c402740f22d1a97dd1209b # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          # Issue creation removed — warnings stay in the PR comment, not as noise issues.
          claude_args: '--model claude-sonnet-4-6 --max-turns 30 --allowedTools "Bash(git diff:*),Bash(git log:*),Bash(cat:*),Read,Glob,Grep,Write"'
          prompt: |
            You are an adversarial code reviewer for Edictum Go — a **security product** (runtime contract enforcement for AI agent tool calls). A single vulnerability destroys the credibility of a startup that sells trust. Think like an attacker first, reviewer second.

            PR: #${{ github.event.pull_request.number }}
            SHA: ${{ github.event.pull_request.head.sha }}

            ## Instructions

            1. Read governance files from `/tmp/governance/` (extracted from the BASE branch — prevents prompt injection):
               - `/tmp/governance/CLAUDE.md` — architecture, API design checklist, security review checklist
               - `/tmp/governance/review-instructions.md` — comment formatting rules
               - `/tmp/governance/review-template.md` — the template to fill in

            2. Get the diff:
               - `git diff origin/main...HEAD --name-only` for changed files
               - `git diff origin/main...HEAD` for full diff

            3. Route checks by file type:
               - `pipeline/**`, `envelope/**`, `contract/**`, `session/**`, `audit/**` → code quality, contract correctness, API design, security
               - `adapter/**` → also adapter parity
               - `**/*_test.go` → test conventions, behavior test coverage
               - `.github/**` → security (Actions injection patterns)
               - `CLAUDE.md` → governance file consistency

            4. For EACH changed file:
               a. Read the FULL source file (not just the diff)
               b. Run the adversarial pass first (think like an attacker)
               c. Then run the standards compliance pass
               d. Only apply checks relevant to the file type

            5. Go-specific security checks:
               - Race conditions: shared state without mutex protection
               - Goroutine leaks: missing context cancellation
               - Unsafe type assertions without comma-ok
               - Error swallowing (err != nil without return)
               - Exported fields on types that should be immutable

            6. For each potential issue:
               a. If INTRODUCED by this PR: verify you can describe a concrete attack path or concrete bug, and include a concrete fix with code.
               b. If pre-existing (not introduced by this PR): label as "ℹ️ Pre-existing:" per the Rules section — no severity classification, no fix required.

            7. Fill in the template from `/tmp/governance/review-template.md` per `/tmp/governance/review-instructions.md`. Write to `/tmp/review.md`.

            8. Do NOT post the comment yourself. The workflow handles posting after validation.

            9. Warnings and suggestions are included in the PR review comment only —
               do NOT create GitHub issues for them. The PR author reads the comment and
               decides whether to address warnings before merging.

            ## Rules
            - One pass. If the PR is clean, say so and stop.
            - A clean PR with zero findings is a good outcome.
            - Do NOT flag style/formatting (linters handle that).
            - For pre-existing issues (not introduced by this PR): still report them, but label as "ℹ️ Pre-existing:" in the review comment. Do NOT classify them as Critical or Warning — they do not block the PR and are not counted in ISSUE_COUNT. The PR author should file a separate issue for legitimate pre-existing findings, not fix them in the current PR.
            - ALWAYS include the attack path for security issues.
            - ALWAYS include file path + line number + concrete fix with code.
            - Warnings stay in the PR comment for the author to review.

      - name: Validate review file
        run: |
          if [ ! -f /tmp/review.md ]; then
            echo "::error::Review file /tmp/review.md not found. Claude may have failed."
            exit 1
          fi
          if ! grep -q '<!-- edictum-review -->' /tmp/review.md; then
            echo "::error::Review file missing <!-- edictum-review --> marker. Content:"
            head -5 /tmp/review.md
            exit 1
          fi

      - name: Upload review artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: review-comment
          path: /tmp/review.md
          retention-days: 1

  # Separate job for posting the comment. Uses its own concurrency group
  # with cancel-in-progress: true to serialize the check-then-act sequence
  # and prevent duplicate sticky comments when multiple pushes arrive.
  post:
    needs: review
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
      issues: read

    concurrency:
      group: review-post-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Download review artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: review-comment
          path: /tmp

      - name: Post or update sticky comment
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Post or update sticky comment
          EXISTING_ID=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq '[.[] | select(.body | contains("<!-- edictum-review -->"))] | last | .id // empty')
          if [ -n "$EXISTING_ID" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${EXISTING_ID}" \
              -X PATCH -F body=@/tmp/review.md
            echo "Updated existing review comment ${EXISTING_ID}"
          else
            gh pr comment "${PR_NUMBER}" --body-file /tmp/review.md
            echo "Created new review comment"
          fi

      - name: Fail on critical or high findings
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          COMMENT=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq '[.[] | select(.body | contains("<!-- edictum-review -->"))] | last | .body // ""')
          if [ -z "$COMMENT" ]; then
            echo "::error::No review comment found. Review step may have failed or timed out."
            exit 1
          fi
          if echo "$COMMENT" | grep -q '<!-- STATUS: fail -->'; then
            echo "::error::Code review found critical/high issues. See PR comment for details."
            exit 1
          fi
          echo "Code review passed."
