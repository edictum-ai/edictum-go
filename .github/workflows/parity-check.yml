name: Parity Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'  # Weekly Monday 4am UTC

permissions:
  contents: read

concurrency:
  group: parity-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    uses: edictum-ai/.github/.github/workflows/sdk-gate.yml@a8b075f4d60354e79bd26e06353c5367b75296b2
    with:
      runner: blacksmith-2vcpu-ubuntu-2404-arm
      runtime: go
      runtime-version: '1.26'
      setup-command: go mod download
      test-command: go test -race ./...
      conformance-command: >-
        EDICTUM_FIXTURES_DIR=$PWD/edictum-schemas/fixtures/rejection
        EDICTUM_CONFORMANCE_REQUIRED=1
        go test -v -run TestSharedRejectionFixtures ./yaml/...
      fixture-ref: bfb633c6019d6b545f5d0e8986c05d9a95087520
