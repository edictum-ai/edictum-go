name: Parity Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'  # Weekly Monday 4am UTC

permissions:
  contents: read

concurrency:
  group: parity-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Inline the Go-only parity gate so this repo can move off Node 20
  # action pins before the shared reusable workflow is refreshed.
  native-tests:
    name: gate / Tests (go 1.26)
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"

      - name: Install dependencies
        run: go mod download

      - name: Run tests
        run: go test -race ./...

  conformance:
    name: gate / Conformance (go)
    needs: native-tests
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout fixtures
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: edictum-ai/edictum-schemas
          ref: bfb633c6019d6b545f5d0e8986c05d9a95087520
          path: edictum-schemas
          sparse-checkout: |
            fixtures
          persist-credentials: false

      - name: Verify fixtures exist
        run: |
          set -euo pipefail
          if [ ! -d "edictum-schemas/fixtures" ]; then
            echo "::error::No fixtures found in edictum-schemas@bfb633c6019d6b545f5d0e8986c05d9a95087520"
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"

      - name: Install dependencies
        run: go mod download

      - name: Run conformance tests
        env:
          EDICTUM_FIXTURES_DIR: ${{ github.workspace }}/edictum-schemas/fixtures/rejection
          EDICTUM_CONFORMANCE_REQUIRED: "1"
        run: go test -v -run TestSharedRejectionFixtures ./yaml/...

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: conformance-failures-go
          path: |
            edictum-schemas/fixtures/
          retention-days: 7
