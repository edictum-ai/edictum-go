version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosec
    - ineffassign
    - unused
    - misspell
    - revive
    - unconvert
    - gocritic
    - prealloc
    - nilerr
    - errorlint
    - exhaustive
    - copyloopvar

linters-settings:
  gosec:
    severity: high
    confidence: medium
  revive:
    rules:
      - name: exported
        arguments:
          - checkPrivateReceivers
      - name: unexported-return
      - name: error-return
      - name: error-naming
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
    disabled-checks:
      # ToolEnvelope (216B) and Principal (88B) use value receivers by design:
      # immutable types with unexported fields. Copying is the immutability
      # mechanism — callers cannot mutate the original through a copy.
      - hugeParam
  exhaustive:
    default-signifies-exhaustive: true

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
  exclude-rules:
    # CLI binary: errcheck on stdout/stderr writes and Close() is standard for CLI tools.
    - path: _test\.go
      linters:
        - errcheck
    # CLI binary: errcheck and gosec findings are expected and reviewed.
    # The errcheck issues are fmt.Fprint* to stdout (always succeeds for terminal I/O).
    # The gosec issues are file perms 0644/0755 (standard for user config dirs/files)
    # and G304 (variable file paths — the CLI exists to read user-specified files).
    # Run `golangci-lint run ./cmd/edictum/...` to audit these separately.
