version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gofmt
    - goimports

linters:
  exclusions:
    # cmd/edictum/ is a CLI binary, not a library.
    rules:
      - path: cmd/edictum/
        linters:
          - errcheck
          - gosec
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosec
    - ineffassign
    - unused
    - misspell
    - revive
    - unconvert
    - gocritic
    - prealloc
    - nilerr
    - errorlint
    - exhaustive
    - copyloopvar

linters-settings:
  gosec:
    severity: high
    confidence: medium
  revive:
    rules:
      - name: exported
        arguments:
          - checkPrivateReceivers
      - name: unexported-return
      - name: error-return
      - name: error-naming
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
    disabled-checks:
      # ToolEnvelope (216B) and Principal (88B) use value receivers by design:
      # immutable types with unexported fields. Copying is the immutability
      # mechanism — callers cannot mutate the original through a copy.
      - hugeParam
  exhaustive:
    default-signifies-exhaustive: true

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck

