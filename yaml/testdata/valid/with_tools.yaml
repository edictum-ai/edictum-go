apiVersion: edictum/v1
kind: Ruleset
metadata:
  name: tools-bundle
defaults:
  mode: enforce
tools:
  ReadFile:
    side_effect: read
    idempotent: true
rules:
  - id: redact-secret
    type: post
    tool: ReadFile
    when:
      "output.text":
        contains: "secret"
    then:
      action: warn
      message: "Sensitive data observed"
